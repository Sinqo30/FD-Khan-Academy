<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking | FD Khan Academy</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>


<body>


<header>

<div class="logo">
FD KHAN ACADEMY
</div>


<nav>

<a href="{{ url_for('home') }}">Home</a>
<a href="{{ url_for('services') }}">Services</a>
<a href="{{ url_for('about') }}">About</a>
<a href="{{ url_for('booking') }}">Booking</a>
<a href="{{ url_for('store') }}">Online Store</a>

</nav>

</header>



<section class="section">


<div class="container">


<h1 class="section-title">
Book A Session
</h1>



<div class="terminal-box">



{% if blocked_slots %}

<h3>Unavailable Slots</h3>

<ul>

{% for slot in blocked_slots %}

<li>
{{ slot.date }} - {{ slot.time }}
</li>

{% endfor %}

</ul>

{% endif %}



<form action="/submit_booking" method="POST">



<input

type="text"

name="name"

placeholder="Full Name"

required>



<input

type="email"

name="email"

placeholder="Email Address"

required>




<select name="grade" class="booking-select" required>


<option value="">
Select Grade
</option>


<option>Grade 8</option>
<option>Grade 9</option>
<option>Grade 10</option>
<option>Grade 11</option>
<option>Grade 12</option>


</select>




<select name="subject" class="booking-select" required>


<option value="">
Select Subject
</option>


<option>Mathematics</option>

<option>Information Technology</option>


</select>





<input

type="date"

name="date"

required>





<select name="time" class="booking-select" required>


<option value="">
Select Time
</option>


<option>08:00</option>
<option>08:30</option>

<option>09:00</option>
<option>09:30</option>

<option>10:00</option>
<option>10:30</option>

<option>11:00</option>
<option>11:30</option>

<option>12:00</option>
<option>12:30</option>

<option>13:00</option>
<option>13:30</option>

<option>14:00</option>
<option>14:30</option>

<option>15:00</option>
<option>15:30</option>

<option>16:00</option>
<option>16:30</option>


</select>





<textarea

rows="6"

name="message"

placeholder="Tell us about your academic goals">

</textarea>




<button

class="btn"

type="submit">

Submit Booking

</button>



</form>


</div>


</div>


</section>




<footer>

© 2026 FD Khan Academy

</footer>



</body>

</html>
