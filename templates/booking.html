<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking | FD Khan Academy</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">


</head>


<body>


<header>


<div class="logo">

FD KHAN ACADEMY

</div>



<nav>


<a href="{{ url_for('home') }}">Home</a>

<a href="{{ url_for('services') }}">Services</a>

<a href="{{ url_for('about') }}">About</a>

<a href="{{ url_for('booking') }}">Booking</a>

<a href="{{ url_for('store') }}">Online Store</a>


</nav>


</header>





<section class="section">


<div class="container">


<h1 class="section-title">

Book A Session

</h1>





<div class="terminal-box">





<form action="/submit_booking" method="POST">





<input

type="text"

name="name"

placeholder="Full Name"

required>




<input

type="email"

name="email"

placeholder="Email Address"

required>





<select

name="grade"

class="booking-select"

required>


<option value="">

Select Grade

</option>


<option>Grade 8</option>

<option>Grade 9</option>

<option>Grade 10</option>

<option>Grade 11</option>

<option>Grade 12</option>


</select>







<select

name="subject"

class="booking-select"

required>


<option value="">

Select Subject

</option>


<option>

Mathematics

</option>


<option>

Information Technology

</option>


</select>







<label>

Select Date

</label>


<input

type="date"

id="date"

name="date"

required>








<label>

Available Time

</label>




<select

id="time"

name="time"

class="booking-select"

required>


<option value="">

Choose a date first

</option>



</select>








<textarea

rows="6"

name="message"

placeholder="Tell us about your academic goals">

</textarea>








<button

class="btn"

type="submit">


Submit Booking


</button>




</form>





</div>


</div>


</section>








<footer>


© 2026 FD Khan Academy


</footer>







<script>


const dateInput = document.getElementById("date");

const timeSelect = document.getElementById("time");



dateInput.addEventListener("change", function(){



let selectedDate = this.value;



timeSelect.innerHTML = "";



fetch("/get_available_slots?date=" + selectedDate)



.then(response => response.json())



.then(slots => {



if(slots.length === 0){



let option = document.createElement("option");

option.textContent = "No slots available";

option.value = "";

timeSelect.appendChild(option);



}

else {



let first = document.createElement("option");

first.textContent = "Select Time";

first.value = "";

timeSelect.appendChild(first);





slots.forEach(function(slot){



let option = document.createElement("option");


option.value = slot;


option.textContent = slot;



timeSelect.appendChild(option);



});



}



});



});



</script>





</body>

</html>
